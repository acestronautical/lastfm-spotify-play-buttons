name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build extension zip
        run: |
          chmod +x scripts/sync-extension.sh scripts/build-extension-zip.sh
          scripts/build-extension-zip.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/lastfm-spotify-play-buttons-extension-v${{ steps.version.outputs.version }}.zip
            lastfm-inject-spotify-buttons.user.js
            spotify-lastfm-puppeteer.user.js
