name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Read tag annotation for release body
        id: tag_body
        run: |
          body=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          {
            echo 'body<<__END_OF_BODY__'
            echo "$body"
            echo '__END_OF_BODY__'
          } >> "$GITHUB_OUTPUT"

      - name: Build extension zip
        run: |
          chmod +x scripts/build.sh scripts/sync-extension.sh scripts/build-extension-zip.sh
          scripts/build-extension-zip.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: ${{ steps.tag_body.outputs.body }}
          files: |
            dist/lastfm-spotify-play-buttons-extension-v${{ steps.version.outputs.version }}.zip
            tampermonkey/lastfm-inject-spotify-buttons.user.js
            tampermonkey/spotify-lastfm-puppeteer.user.js
