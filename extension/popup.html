<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <header>
        <div class="title-block">
            <span class="dot"></span>
            <h1>Last.fm → Spotify</h1>
        </div>
        <span class="version" id="version"></span>
    </header>

    <section>
        <h2>Playback</h2>

        <label class="toggle">
            <input type="checkbox" id="foreground">
            <span class="switch"></span>
            <span class="label-text">Open Spotify tabs in foreground</span>
        </label>

        <label class="toggle">
            <input type="checkbox" id="autoClose">
            <span class="switch"></span>
            <span class="label-text">Auto-close helper tab after action</span>
        </label>

        <div class="radio-group">
            <span class="radio-label">Default click action</span>
            <label class="radio">
                <input type="radio" name="defaultAction" value="play">
                <span>Play</span>
            </label>
            <label class="radio">
                <input type="radio" name="defaultAction" value="queue">
                <span>Queue</span>
            </label>
            <label class="radio">
                <input type="radio" name="defaultAction" value="like">
                <span>Like</span>
            </label>
        </div>
    </section>

    <section>
        <h2>Menu</h2>

        <div class="range-group">
            <div class="range-row">
                <span class="label-text">Hover delay</span>
                <span class="range-value" id="menuDelay-value"></span>
            </div>
            <input type="range" id="menuDelay" min="0" max="100" step="1">
        </div>

        <div class="range-group">
            <div class="range-row">
                <span class="label-text">Batch queue limit</span>
                <span class="range-value" id="queueLimit-value"></span>
            </div>
            <input type="range" id="queueLimit" min="1" max="50" step="1">
        </div>
    </section>

    <section>
        <h2>Appearance</h2>

        <label class="toggle">
            <input type="checkbox" id="entityBadges">
            <span class="switch"></span>
            <span class="label-text">Show (artist / album / track) on icon</span>
        </label>
    </section>

    <footer>
        <a id="repo" href="#" target="_blank" rel="noopener noreferrer">GitHub</a>
        <span class="sep">·</span>
        <a href="chrome://extensions" id="extensions-link">Manage / disable</a>
    </footer>

    <script src="popup.js"></script>

</body>
</html>
