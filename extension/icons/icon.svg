<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Extension icon: three horizontal stripes stacked in the same
       red / white / green identity used by the in-page hamburger
       menu (.spotify-nav-menu-toggle). Sharing the exact same
       silhouette between the toolbar icon and the in-page menu
       gives users a discoverability cue — "the button in my toolbar
       and this menu in the Last.fm nav are the same thing."
       Transparent background so the icon adapts to whatever toolbar
       theme the browser is using. -->

  <path d="M8 20h112"  stroke="#D51007" stroke-width="22" stroke-linecap="round"/>
  <path d="M8 64h112"  stroke="#fff"    stroke-width="22" stroke-linecap="round"/>
  <path d="M8 108h112" stroke="#1DB954" stroke-width="22" stroke-linecap="round"/>
</svg>
